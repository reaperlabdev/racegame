<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>First Person Gyro Racer</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                background: #000;
                touch-action: none; /* Prevents pull-to-refresh on mobile */
                user-select: none;
                font-family: sans-serif;
            }
            canvas {
                display: block;
            }

            #startMenu {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.85);
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                color: white;
                z-index: 10;
            }
            #startMenu h1 {
                margin-bottom: 10px;
            }
            #startMenu p {
                margin-bottom: 30px;
                text-align: center;
                padding: 0 20px;
            }

            #startBtn {
                padding: 15px 40px;
                font-size: 22px;
                font-weight: bold;
                cursor: pointer;
                background: #228b22;
                color: white;
                border: none;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            }
            #startBtn:active {
                background: #1a6b1a;
                transform: translateY(2px);
            }
        </style>
    </head>
    <body>
        <div id="startMenu">
            <h1>Gyro Racer</h1>
            <p>
                Tilt your phone to steer.<br />Tap and hold the screen to brake.
            </p>
            <button id="startBtn">Start Game</button>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- type="module" enables ES module imports and defers execution automatically -->
        <script type="module">
            import { initUI } from "./js/ui.js";
            initUI();
        </script>
    </body>
</html>
