<!doctype html>
<html>
    <head>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=no"
        />
        <title>racegame</title>

        <style>
            body {
                margin: 0;
                overflow: hidden;
                touch-action: none; /* 🔥 CRITICAL */
            }

            #gameCanvas {
                width: 100vw;
                height: 100vh;
                display: block;
            }

            .ui {
                position: fixed;
                bottom: 20px;
                width: 100%;
                display: flex;
                justify-content: space-between;
                padding: 0 20px;
                z-index: 10;
            }

            .btn {
                width: 80px;
                height: 80px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.2);
                border: 2px solid rgba(255, 255, 255, 0.4);
                display: flex;
                align-items: center;
                justify-content: center;
                user-select: none;
                -webkit-user-select: none;
                touch-action: none;
            }
        </style>
    </head>

    <body>
        <canvas id="gameCanvas"></canvas>

        <div class="ui">
            <div id="brakeBtn" class="btn">⟲</div>
            <div id="gasBtn" class="btn">⟰</div>
        </div>

        <script type="module" src="src/game.js"></script>
    </body>
</html>
