<!doctype html>
<html>
    <head>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=no"
        />
        <title>racegame</title>

        <style>
            body {
                margin: 0;
                overflow: hidden;
                background: black;
                touch-action: none;
            }

            #gameCanvas {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                display: block;
            }

            .ui {
                position: fixed;
                bottom: 20px;
                width: 100%;
                display: flex;
                justify-content: space-between;
                padding: 0 20px;
                pointer-events: none;
            }

            .btn {
                width: 80px;
                height: 80px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.15);
                border: 2px solid rgba(255, 255, 255, 0.3);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                color: white;
                user-select: none;
                pointer-events: auto;
            }
        </style>
    </head>

    <body>
        <canvas id="gameCanvas"></canvas>

        <div class="ui">
            <div id="brakeBtn" class="btn">⟲</div>
            <div id="gasBtn" class="btn">⟰</div>
        </div>

        <script type="module" src="src/game.js"></script>
    </body>
</html>
