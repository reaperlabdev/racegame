<!doctype html>
<html>
    <head>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>racegame</title>

        <style>
            body {
                margin: 0;
                overflow: hidden;
                touch-action: none;
                overscroll-behavior: none;
            }
            #gameCanvas {
                width: 100vw;
                height: 100vh;
                display: block;
            }
            .ui {
                position: fixed;
                bottom: 20px;
                width: 100%;
                display: flex;
                justify-content: space-between;
                padding: 0 20px;
                z-index: 10;
                box-sizing: border-box;
            }
            .btn {
                width: 80px;
                height: 80px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.2);
                border: 2px solid rgba(255, 255, 255, 0.4);
                display: flex;
                align-items: center;
                justify-content: center;
                user-select: none;
                -webkit-user-select: none;
                touch-action: none;
            }

            .ui {
                pointer-events: none;
            }

            .ui .btn {
                pointer-events: auto;
            }

            @media (hover: hover) and (pointer: fine) {
                .ui {
                    display: none;
                }
            }
        </style>
    </head>

    <body>
        <canvas id="gameCanvas"></canvas>

        <div class="ui">
            <div id="brakeBtn" class="btn">⟲</div>
            <div id="gasBtn" class="btn">⟰</div>
        </div>

        <div
            id="startOverlay"
            style="
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.7);
                color: white;
                font-size: 24px;
                font-family: sans-serif;
                align-items: center;
                justify-content: center;
                z-index: 100;
                cursor: pointer;
            "
        >
            Tap to Play
        </div>

        <script type="module" src="src/game.js"></script>
    </body>
</html>
